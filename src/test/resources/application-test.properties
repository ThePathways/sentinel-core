# 1. STOP Spring from trying to start the Kafka engine automatically
spring.kafka.streams.auto-startup=false

# 2. Point to a fake location so it doesn't try to connect to Aiven
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.properties.security.protocol=PLAINTEXT
spring.kafka.streams.properties.security.protocol=PLAINTEXT

# 3. Clear SSL locations to avoid "File Not Found" errors
spring.kafka.properties.ssl.truststore.location=
spring.kafka.properties.ssl.keystore.location=

# 4. Use a separate H2 database for testing so you don't mess up your real one
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1